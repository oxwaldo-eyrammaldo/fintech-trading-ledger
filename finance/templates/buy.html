{% extends "layout.html" %}

{% block title %}
    Purchase Shares
{% endblock %}

{% block main %}
    <form action="/buy" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Ticker Symbol" type="text" required>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="shares" placeholder="Shares" type="text" required>
        </div>
        <button class="btn btn-success" type="submit">Purchase Order</button>
    </form>
{% endblock %}
