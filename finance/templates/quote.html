{% extends "layout.html" %}

{% block title %}
    Stock Quote Lookup
{% endblock %}

{% block main %}
    <form action="/quote" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Ticker Symbol" type="text" required>
        </div>
        <button class="btn btn-primary" type="submit">Lookup Price</button>
    </form>
{% endblock %}
